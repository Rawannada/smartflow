# Name of the project
name: 'dbt_logistics'
version: '1.0.0'
config-version: 2

# This matches the name in your ~/.dbt/profiles.yml
profile: 'dbt_logistics'

# Directory paths
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Configuring models
models:
  dbt_logistics:

    +materialized: table
    +schema: analytics
   
    
    
    example:
      +enabled: false