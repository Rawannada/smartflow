services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: logistics_db
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d logistics_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smartflow_net

  airflow-init:
    build: .
    image: custom-airflow-dbt:latest
    container_name: airflow_init
    entrypoint: /bin/bash -c "airflow db init && airflow users create --username admin --firstname Rawan --lastname Nada --role Admin --email admin@example.com --password admin"
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://admin:password123@postgres:5432/logistics_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smartflow_net

  airflow-webserver:
    build: .
    image: custom-airflow-dbt:latest
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./dbt_logistics:/opt/airflow/dbt_project
      - ./profiles.yml:/home/airflow/.dbt/profiles.yml
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://admin:password123@postgres:5432/logistics_db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - smartflow_net

  airflow-scheduler:
    build: .
    image: custom-airflow-dbt:latest
    container_name: airflow_scheduler
    restart: always
    command: scheduler
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./dbt_logistics:/opt/airflow/dbt_project
      - ./dbt_logistics/profiles.yml:/home/airflow/.dbt/profiles.yml
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://admin:password123@postgres:5432/logistics_db
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - smartflow_net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - smartflow_net

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    depends_on: [ zookeeper ]
    ports: [ "29092:29092" ]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - smartflow_net

  spark-master:
    image: apache/spark:3.4.0
    container_name: spark-master
    ports: [ "8081:8080", "7077:7077" ]
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    networks:
      - smartflow_net

  spark-worker:
    image: apache/spark:3.4.0
    container_name: spark-worker
    depends_on: [ spark-master ]
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    networks:
      - smartflow_net

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: smartflow_dashboard
    ports:
      - "8501:8501"
    environment:
      - DB_URL=postgresql://admin:password123@postgres:5432/logistics_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smartflow_net

networks:
  smartflow_net:
    driver: bridge
